name: AniBench v2 verification

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "0"
      TZ: UTC
      LC_ALL: C.UTF-8
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip packaging
      - run: python -m pip install -e '.[dev]'
      - run: ruff check src tests scripts
      - run: python scripts/verify_release_metadata.py --pretty
      - run: python scripts/verify_external_field_receipts.py --pretty
      - run: python -m pytest -q
      - run: >-
          python -m anibench.cli eval
          web/protocol-capacity-example.json
          --out /tmp/anibench-eval.json --pretty
      - run: >-
          python -c "import json, pathlib; root=pathlib.Path('web'); request=json.loads(root.joinpath('optimizer-protocol-example.json').read_text()); request['base_protocol']=json.loads(root.joinpath('protocol-capacity-example.json').read_text()); pathlib.Path('/tmp/anibench-optimizer-request.json').write_text(json.dumps(request))"
      - run: >-
          python -m anibench.cli v2-optimize-protocol
          /tmp/anibench-optimizer-request.json
          --out /tmp/anibench-optimizer-result.json --pretty

  web:
    name: Studio JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: node --test web/v2.test.js

  public-boundary:
    name: Fresh-history public export
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "0"
      TZ: UTC
      LC_ALL: C.UTF-8
      MPLBACKEND: Agg
      SOURCE_DATE_EPOCH: "1783900800"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip build packaging 'reuse[charset-normalizer]'
      - run: python -m pip install -e '.[dev]'
      - name: Export one-root public repository
        run: >-
          python scripts/export_public_repository.py
          --output /tmp/anibench-public
          --source-date-epoch "$SOURCE_DATE_EPOCH"
          --init-git
      - name: Verify fresh history and repository scan
        working-directory: /tmp/anibench-public
        run: |
          test "$(git rev-list --all --count)" = "1"
          test "$(git rev-list --max-parents=0 --all | wc -l | tr -d ' ')" = "1"
          test -z "$(git status --porcelain=v1)"
          test -z "$(git remote)"
          PYTHONPATH=src python -c "from pathlib import Path; from scripts.export_public_repository import inspect_public_repository; assert inspect_public_repository(Path('.'))['passed']"
          python scripts/verify_external_field_receipts.py --pretty
      - name: Test the exact public tree
        working-directory: /tmp/anibench-public
        run: |
          python -m pip install -e '.[dev]'
          reuse lint
          python -m pytest -q
          node --test web/v2.test.js
      - name: Build and inspect public distributions
        working-directory: /tmp/anibench-public
        run: |
          python -m build
          python scripts/verify_distribution_boundary.py dist/*.whl dist/*.tar.gz --pretty
      - name: Browser-test the exact installed wheel
        working-directory: /tmp/anibench-public
        run: >-
          python scripts/verify_installed_studio.py
          --wheel dist/*.whl
          --receipt dist/INSTALLED_STUDIO_E2E_RECEIPT.json
          --pretty
      - name: Smoke-install the exact wheel outside the checkout
        working-directory: /tmp/anibench-public
        run: |
          python -m venv /tmp/anibench-wheel-smoke
          /tmp/anibench-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/anibench-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/anibench-wheel-smoke/bin/anibench --help
          /tmp/anibench-wheel-smoke/bin/anibench eval \
            /tmp/anibench-public/web/protocol-capacity-example.json \
            --out /tmp/installed-eval.json --pretty
          /tmp/anibench-wheel-smoke/bin/python -c "import json, pathlib; root=pathlib.Path('/tmp/anibench-public/web'); request=json.loads(root.joinpath('optimizer-protocol-example.json').read_text()); request['base_protocol']=json.loads(root.joinpath('protocol-capacity-example.json').read_text()); pathlib.Path('/tmp/installed-optimizer-request.json').write_text(json.dumps(request))"
          /tmp/anibench-wheel-smoke/bin/anibench v2-optimize-protocol \
            /tmp/installed-optimizer-request.json \
            --out /tmp/installed-optimizer-result.json --pretty
